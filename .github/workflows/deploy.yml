name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only run one deploy at a time; cancel in-progress if a newer push lands.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ── Deploy API to Railway ────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service alion-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy dashboard to Vercel ───────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard → Vercel
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        # VERCEL_TOKEN env var is picked up automatically by the Vercel CLI.
        run: pnpm dlx vercel deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
