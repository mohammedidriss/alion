# Both pre-commit (local) and CI run the same checks via `uv run`,
# so versions come from one place: pyproject.toml + uv.lock.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy packages
        language: system
        types: [python]
        pass_filenames: false

      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
